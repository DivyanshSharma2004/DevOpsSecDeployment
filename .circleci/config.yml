version: 2.1

workflows:
  version: 2
  build_and_deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
      - deploy:
          requires:
            - build

jobs:
  build:
    docker:
      - image: cimg/node:18.16.0
    steps:
      - checkout
      
      - run: npm install
       
      - run:
          name: Run tests
          command: npm test || echo "no tests found"
       
      - run:
          name: Security audit
          command: npm audit || true

  deploy:
      machine: true
      steps:
        - checkout
        - run:
            name: Deploy to EC2
            command: |
              ssh -o StrictHostKeyChecking=no ec2-user@13.60.51.168 "
                cd DevOpsSecDeployment &&
                echo \"$PRIVATE_KEY\" > bin/privatekey.pem &&
                echo \"$SERVER\" > bin/server.crt &&
                git pull &&
                npm install &&
                pm2 restart myapp || pm2 start bin/www --name myapp
              "

  