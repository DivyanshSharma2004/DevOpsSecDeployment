version: 2.1

workflows:
  version: 2
  build_and_deploy:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main
      - deploy:
          requires:
            - build

jobs:
  build:
    docker:
      - image: circleci/node:18
    steps:
      - checkout
      - run: npm install 

  deploy:
      machine: true
      steps:
        - checkout
        - run:
            name: Deploy to EC2
            command: |
              ssh -o StrictHostKeyChecking=no ec2-user@13.60.51.168 "
                cd DevOpsSecDeployment &&
                git pull &&
                npm install &&
                pm2 restart myapp || pm2 start bin/www --name myapp --env DEV
              "

  